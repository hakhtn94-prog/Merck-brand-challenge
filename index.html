<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Merck Brand Challenge</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
}

.wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
}

.header {
    width: 100%;
    background: #0b3d91;
    color: white;
    padding: 12px;
}

.header h1 {
    margin: 5px 0;
    font-size: 20px;
}

.banner {
    display: inline-block;
    background: #ffcc00;
    color: #000;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: bold;
}

.guide {
    background: #fff3cd;
    border: 1px solid #ffeeba;
    padding: 10px;
    border-radius: 10px;
    margin: 10px;
    font-size: 14px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.slot, .box {
    width: 45px;
    height: 45px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.slot {
    border: 2px dashed #aaa;
    background: white;
    cursor: pointer;
}

.box {
    background: #e8f0ff;
    border: 2px solid #333;
    cursor: pointer;
    user-select: none;
}

.box.selected {
    background: #ffcc80;
}

/* BUTTON */
button {
    padding: 12px 18px;
    margin: 5px;
    background: #2196f3;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

#status {
    margin-top: 10px;
    font-weight: bold;
}

/* REWARD OVERLAY */
#reward {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* BOX TRẮNG CHIẾN THẮNG */
#rewardBox {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <h1>🎮 Merck Brand Challenge</h1>
    <div class="banner">🎁 Nhận quà hấp dẫn tại Booth D3 - Merck</div>
</div>

<div class="guide">
👉 Chạm chữ cái → chọn → chạm ô trống để sắp xếp đúng đáp án
</div>

<div id="game"></div>

<button onclick="check()">✔ Kiểm tra</button>
<button onclick="restart()">🔁 Chơi lại</button>

<div id="status"></div>

</div>

<!-- REWARD -->
<div id="reward">
    <div id="rewardBox">
        <h2>🎉 CHÚC MỪNG!</h2>
        <p>Bạn đã hoàn thành thử thách</p>
        <p>Mã nhận thưởng:</p>
        <div id="code" style="font-size:22px;color:red;font-weight:bold;margin:10px 0;"></div>
        <p>📍 Mang mã đến <b>Booth D3 - Merck</b> để nhận quà 🎁</p>
    </div>
</div>

<script>

const questions = [
{
    desc: "Đây là brand chuyên cho các sản phẩm phân tích, chất chuẩn",
    answer: "SUPELCO",
    hint: "S",
    letters: ["U","P","E","L","C","O"]
},
{
    desc: "Đây là brand chuyên cho các sản phẩm hóa chất nghiên cứu cơ bản, R&D",
    answer: "SIGMAALDRICH",
    hint: "S",
    letters: ["I","G","M","A","A","L","D","R","I","C","H"]
},
{
    desc: "Đây là brand chuyên cho các sản phẩm màng lọc, kiểm soát vi sinh",
    answer: "MILLIPORE",
    hint: "M",
    letters: ["I","L","L","I","P","O","R","E"]
},
{
    desc: "Đây là brand chuyên cho hệ thống lọc nước siêu tinh khiết",
    answer: "MILLIQ",
    hint: "M",
    letters: ["I","L","L","I","Q"]
}
];

let current = 0;
let selected = null;

render();

/* ================= RENDER ================= */
function render() {
    selected = null;
    const q = questions[current];

    let html = `
        <div class="question">❓ ${q.desc}</div>

        <div class="hint">
            💡 Gợi ý: chữ cái đầu tiên là <b>${q.hint}</b>
        </div>

        <div class="container">
            <div class="slot fixed">${q.hint}</div>
    `;

    for (let i = 1; i < q.answer.length; i++) {
        html += `<div class="slot" onclick="toggleSlot(this)"></div>`;
    }

    html += `</div><div class="container">`;

    let shuffled = [...q.letters].sort(() => Math.random() - 0.5);

    shuffled.forEach(l => {
        html += `<div class="box" onclick="select(this)">${l}</div>`;
    });

    html += `</div>`;

    document.getElementById("game").innerHTML = html;
}

/* ================= SELECT ================= */
function select(el) {
    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
    selected = el;
    el.classList.add("selected");
}

/* ================= PLACE / RETURN FIX ================= */
function toggleSlot(slot) {

    const boxes = document.querySelectorAll(".box");

    // nếu slot có chữ → trả về kho
    if (slot.innerText !== "") {
        boxes.forEach(b => {
            if (b.innerText === slot.innerText) {
                b.style.display = "flex";
            }
        });
        slot.innerText = "";
        return;
    }

    // đặt chữ mới
    if (!selected) return;

    slot.innerText = selected.innerText;
    selected.style.display = "none";
    selected.classList.remove("selected");
    selected = null;
}

/* ================= CHECK ================= */
function check() {
    const q = questions[current];
    const slots = document.querySelectorAll(".slot");

    let ans = "";
    slots.forEach(s => ans += s.innerText);

    if (ans === q.answer) {
        current++;

        if (current >= questions.length) {
            showReward();
        } else {
            render();
        }
    } else {
        document.getElementById("status").innerText = "❌ Sai rồi!";
    }
}

/* ================= CONFETTI ================= */
function confetti() {
    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (Math.random()*2+2) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}

/* ================= REWARD ================= */
function showReward() {
    confetti();

    const code = "MERCK-" + Math.random().toString(36).substring(2,8).toUpperCase();

    document.getElementById("code").innerText = code;
    document.getElementById("reward").style.display = "flex";
}

/* ================= RESTART ================= */
function restart() {
    current = 0;
    selected = null;
    document.getElementById("status").innerText = "";
    document.getElementById("reward").style.display = "none";
    render();
}

</script>

</body>
</html>
