<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Merck Brand Challenge</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
    overflow-x: hidden;
}

/* FULL SCREEN APP STYLE */
.container-app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
}

/* HEADER */
.header {
    width: 100%;
    background: #0b3d91;
    color: white;
    padding: 12px;
}

.logo {
    height: 40px;
    margin-bottom: 5px;
}

/* BANNER */
.banner {
    background: #ffcc00;
    color: #000;
    padding: 8px;
    border-radius: 8px;
    margin-top: 8px;
    font-weight: bold;
}

/* GUIDE */
.guide {
    background: #fff3cd;
    padding: 10px;
    border-radius: 10px;
    margin: 10px;
    font-size: 14px;
}

/* GAME */
.question {
    font-size: 18px;
    margin: 10px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px;
}

.slot, .box {
    width: 45px;
    height: 45px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.slot {
    border: 2px dashed #aaa;
    background: white;
}

.fixed {
    background: #c8f7c5;
    border: 2px solid green;
    font-weight: bold;
}

.box {
    background: #e8f0ff;
    border: 2px solid #333;
    cursor: pointer;
}

.box.selected {
    background: #ffcc80;
}

/* BUTTON */
button {
    padding: 12px 18px;
    background: #2196f3;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

/* STATUS */
#status {
    margin: 10px;
    font-weight: bold;
}

/* REWARD */
#reward {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

#rewardBox {
    background:white;
    padding:25px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

/* CONFETTI */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    background: red;
    top: -10px;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}
</style>

</head>

<body>

<div class="container-app">

<!-- HEADER -->

<div class="header">
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Merck_Logo.svg">
    <div>🎮 Merck Brand Challenge</div>
    <div class="banner">🎁 Nhận quà hấp dẫn tại Booth D3 - Merck</div>
</div>

<!-- GUIDE -->

<div class="guide">
👉 Cách chơi: Chạm vào chữ cái → chọn → chạm ô trống để sắp xếp đúng đáp án
</div>

<div id="game"></div>

<button onclick="check()">✔ Kiểm tra</button>

<div id="status"></div>

</div>

<!-- REWARD -->

<div id="reward">
    <div id="rewardBox">
        <h2>🎉 CHÚC MỪNG!</h2>
        <div id="code" style="font-size:20px;color:red;font-weight:bold;"></div>
        <p>📍 Đến Booth D3 để nhận quà</p>
    </div>
</div>

<!-- SOUND -->

<audio id="okSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio> <audio id="failSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio> <audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>

const questions = [
{
    clue: "phân tích, chất chuẩn",
    answer: "SUPELCO",
    hint: "S",
    letters: ["U","P","E","L","C","O"]
},
{
    clue: "nghiên cứu R&D",
    answer: "SIGMAALDRICH",
    hint: "S",
    letters: ["I","G","M","A","A","L","D","R","I","C","H"]
}
];

let current = 0;
let selected = null;

if (localStorage.getItem("merck_played") === "1") {
    document.body.innerHTML = "<h2>🚫 Bạn đã chơi rồi</h2>";
} else {
    render();
}

function render() {
    const q = questions[current];

    let html = `
        <div class="question">❓ Đây là brand chuyên cho: <b>${q.clue}</b></div>
        <div class="hint">💡 Gợi ý: chữ cái đầu tiên là <b>${q.hint}</b></div>

        <div class="container">
            <div class="slot fixed">${q.hint}</div>
    `;

    for (let i = 1; i < q.answer.length; i++) {
        html += `<div class="slot" onclick="place(this)"></div>`;
    }

    html += `</div><div class="container">`;

    let shuffled = [...q.letters].sort(() => Math.random() - 0.5);

    shuffled.forEach(l => {
        html += `<div class="box" onclick="select(this)">${l}</div>`;
    });

    html += `</div>`;

    document.getElementById("game").innerHTML = html;
}

function select(el) {
    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
    selected = el;
    el.classList.add("selected");
}

function place(slot) {
    if (!selected || slot.innerText !== "") return;
    slot.innerText = selected.innerText;
    selected.style.visibility = "hidden";
    selected = null;
}

function check() {
    const okSound = document.getElementById("okSound");
    const failSound = document.getElementById("failSound");

    const q = questions[current];
    const slots = document.querySelectorAll(".slot");

    let ans = "";
    slots.forEach(s => ans += s.innerText);

    if (ans === q.answer) {
        okSound.play();
        current++;

        if (current < questions.length) {
            render();
        } else {
            showReward();
        }
    } else {
        failSound.play();
        document.getElementById("status").innerText = "❌ Sai rồi!";
    }
}

function showReward() {
    document.getElementById("winSound").play();

    const code = "MERCK-" + Math.random().toString(36).substring(2,8).toUpperCase();
    document.getElementById("code").innerText = code;
    document.getElementById("reward").style.display = "flex";

    localStorage.setItem("merck_played", "1");

    // CONFETTI
    for (let i = 0; i < 30; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["red","blue","yellow","green"][Math.floor(Math.random()*4)];
        c.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
