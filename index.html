<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Merck Brand Challenge</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
}

.wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
}

/* HEADER */
.header {
    width: 100%;
    background: #0b3d91;
    color: white;
    padding: 12px;
}

.header h1 {
    margin: 5px 0;
    font-size: 20px;
}

.banner {
    display: inline-block;
    background: #ffcc00;
    color: #000;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: bold;
}

/* GUIDE */
.guide {
    background: #fff3cd;
    border: 1px solid #ffeeba;
    padding: 10px;
    border-radius: 10px;
    margin: 10px;
    font-size: 14px;
}

/* GAME */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
}

.slot, .box {
    width: 45px;
    height: 45px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.slot {
    border: 2px dashed #aaa;
    background: white;
}

.fixed {
    background: #c8f7c5;
    border: 2px solid green;
    font-weight: bold;
}

.box {
    background: #e8f0ff;
    border: 2px solid #333;
    cursor: pointer;
    user-select: none;
}

.box.selected {
    background: #ffcc80;
}

/* BUTTON */
button {
    padding: 12px 18px;
    background: #2196f3;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

/* STATUS */
#status {
    margin-top: 10px;
    font-weight: bold;
}

/* REWARD */
#reward {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

#rewardBox {
    background:white;
    padding:25px;
    border-radius:12px;
    width:300px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <h1>🎮 Merck Brand Challenge</h1>
    <div class="banner">🎁 Nhận quà hấp dẫn tại Booth D3 - Merck</div>
</div>

<div class="guide">
👉 Cách chơi: Chạm chữ cái → chọn → chạm ô trống để sắp xếp đúng đáp án
</div>

<div id="game"></div>

<button onclick="check()">✔ Kiểm tra</button>

<div id="status"></div>

</div>

<!-- REWARD POPUP -->
<div id="reward">
    <div id="rewardBox">

        <h2>🎉 CHÚC MỪNG!</h2>

        <p>Đây là mã nhận thưởng của bạn</p>

        <div id="code" style="font-size:22px;color:red;font-weight:bold;margin:10px 0;"></div>

        <p>
            📍 Vui lòng <b>mang mã này đến Booth D3 - Merck</b><br>
            để đổi quà tại sự kiện 🎁
        </p>

    </div>
</div>

<script>

const questions = [
{
    clue: "phân tích, chất chuẩn",
    answer: "SUPELCO",
    hint: "S",
    letters: ["U","P","E","L","C","O"]
},
{
    clue: "nghiên cứu R&D",
    answer: "SIGMAALDRICH",
    hint: "S",
    letters: ["I","G","M","A","A","L","D","R","I","C","H"]
},
{
    clue: "màng lọc, chuẩn bị mẫu",
    answer: "MILLIPORE",
    hint: "M",
    letters: ["I","L","L","I","P","O","R","E"]
},
{
    clue: "máy lọc nước",
    answer: "MILLIQ",
    hint: "M",
    letters: ["I","L","L","I","Q"]
}
];

let current = 0;
let selected = null;

if (localStorage.getItem("merck_played") === "1") {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>🚫 Bạn đã chơi rồi</h2>";
} else {
    render();
}

function render() {
    const q = questions[current];

    let html = `
        <div class="question">❓ Đây là brand chuyên cho: <b>${q.clue}</b></div>
        <div class="hint">💡 Gợi ý: chữ cái đầu tiên là <b>${q.hint}</b></div>

        <div class="container">
            <div class="slot fixed">${q.hint}</div>
    `;

    for (let i = 1; i < q.answer.length; i++) {
        html += `<div class="slot" onclick="place(this)"></div>`;
    }

    html += `</div><div class="container">`;

    let shuffled = [...q.letters].sort(() => Math.random() - 0.5);

    shuffled.forEach(l => {
        html += `<div class="box" onclick="select(this)">${l}</div>`;
    });

    html += `</div>`;

    document.getElementById("game").innerHTML = html;
}

function select(el) {
    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
    selected = el;
    el.classList.add("selected");
}

function place(slot) {
    if (!selected || slot.innerText !== "") return;
    slot.innerText = selected.innerText;
    selected.style.visibility = "hidden";
    selected = null;
}

function check() {
    const q = questions[current];
    const slots = document.querySelectorAll(".slot");

    let ans = "";
    slots.forEach(s => ans += s.innerText);

    if (ans === q.answer) {
        current++;
        if (current < questions.length) {
            render();
        } else {
            showReward();
        }
    } else {
        document.getElementById("status").innerText = "❌ Sai rồi!";
    }
}

/* =========================
   🎁 HIỂN THỊ MÃ NHẬN QUÀ
========================= */
function showReward() {

    // tạo mã ngẫu nhiên
    const code = "MERCK-" + Math.random().toString(36).substring(2,8).toUpperCase();

    // hiển thị mã
    document.getElementById("code").innerText = code;

    // mở popup
    document.getElementById("reward").style.display = "flex";

    // khóa chơi lại
    localStorage.setItem("merck_played", "1");

    // thông báo thêm
    document.getElementById("status").innerText =
        "🎁 Mang mã đến Booth D3 - Merck để nhận quà!";
}

</script>

</body>
</html>
