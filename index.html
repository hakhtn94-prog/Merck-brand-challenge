<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merck Brand Challenge</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
    padding: 20px;
}

.header h1 {
    color: #0b3d91;
}

.banner {
    display: inline-block;
    background: #0b3d91;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
}

.question {
    font-size: 18px;
    margin: 15px 0;
}

.hint {
    color: #0077cc;
    margin-bottom: 15px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
}

.slot, .box {
    width: 45px;
    height: 45px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
}

.slot {
    border: 2px dashed #aaa;
    background: white;
}

.fixed {
    background: #c8f7c5;
    border: 2px solid green;
    font-weight: bold;
}

.box {
    background: #e8f0ff;
    border: 2px solid #333;
    cursor: pointer;
}

.box.selected {
    background: #ffcc80;
}

button {
    margin-top: 10px;
    padding: 10px 16px;
    border: none;
    border-radius: 5px;
    background: #2196f3;
    color: white;
    font-size: 16px;
}

#status {
    margin-top: 10px;
    font-weight: bold;
}

/* reward */
#reward {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

#rewardBox {
    background:white;
    padding:25px;
    border-radius:10px;
    width:300px;
}

.code {
    font-size: 20px;
    font-weight: bold;
    color: #d32f2f;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">
    <h1>🎮 Merck Brand Challenge</h1>
    <div class="banner">🎁 Nhận quà tại Booth D3</div>
</div>

<div id="game"></div>

<button onclick="check()">✔ Kiểm tra</button>

<div id="status"></div>

<div id="reward">
    <div id="rewardBox">
        <h2>🎉 HOÀN THÀNH!</h2>
        <div class="code" id="code"></div>
    </div>
</div>

<script>
const questions = [
{
    clue: "Brand cho phân tích, chất chuẩn",
    answer: "SUPELCO",
    hint: "S",
    letters: ["U","P","E","L","C","O"]
},
{
    clue: "Brand cho R&D",
    answer: "SIGMAALDRICH",
    hint: "S",
    letters: ["I","G","M","A","A","L","D","R","I","C","H"]
}
];

let current = 0;
let selected = null;

if (localStorage.getItem("merck_played") === "1") {
    document.body.innerHTML = "<h2>🚫 Bạn đã chơi rồi</h2>";
} else {
    render();
}

function render() {
    const q = questions[current];

    let html = `
        <div class="question">${q.clue}</div>
        <div class="hint">Gợi ý: ${q.hint}</div>

        <div class="container">
            <div class="slot fixed">${q.hint}</div>
    `;

    for (let i = 1; i < q.answer.length; i++) {
        html += `<div class="slot" onclick="place(this)"></div>`;
    }

    html += `</div><div class="container">`;

    let shuffled = [...q.letters].sort(() => Math.random() - 0.5);

    shuffled.forEach(l => {
        html += `<div class="box" onclick="select(this)">${l}</div>`;
    });

    html += `</div>`;

    document.getElementById("game").innerHTML = html;
    document.getElementById("status").innerText = "";
}

function select(el) {
    document.querySelectorAll(".box").forEach(b => b.classList.remove("selected"));
    selected = el;
    el.classList.add("selected");
}

function place(slot) {
    if (!selected || slot.innerText !== "") return;

    slot.innerText = selected.innerText;
    selected.style.visibility = "hidden";
    selected = null;
}

function check() {
    const q = questions[current];
    const slots = document.querySelectorAll(".slot");

    let ans = "";
    slots.forEach(s => ans += s.innerText);

    if (ans === q.answer) {
        current++;
        if (current < questions.length) {
            render();
        } else {
            showReward();
        }
    } else {
        document.getElementById("status").innerText = "❌ Sai rồi!";
    }
}

function showReward() {
    const code = "MERCK-" + Math.random().toString(36).substring(2,8).toUpperCase();
    document.getElementById("code").innerText = code;
    document.getElementById("reward").style.display = "flex";
    localStorage.setItem("merck_played", "1");
}
</script>

</body>
</html>
